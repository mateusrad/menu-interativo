<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doces — 15 Anos Bárbara</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Montserrat:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column; /* Necessário para a assinatura no rodapé */
            align-items: center;
            justify-content: center;
            background: linear-gradient(160deg, #f7dde6 0%, #f9ece8 50%, #f5d8e2 100%);
            padding: 2rem 1rem;
        }

        .card {
            width: 100%;
            max-width: 380px;
            background: linear-gradient(175deg, #fff5f7 0%, #fdeef2 100%);
            border-radius: 32px;
            padding: 2rem 1.8rem 2.2rem;
            box-shadow: 0 12px 40px rgba(180, 80, 110, 0.13);
            border: 1px solid rgba(240, 185, 200, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .btn-voltar {
            align-self: flex-start;
            font-size: 11px;
            font-weight: 700;
            color: #c0607c;
            text-decoration: none;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            transition: color 0.2s ease;
        }

        .btn-voltar:hover { color: #b05570; }

        .badge-15 { width: 56px; height: 56px; border-radius: 50%; border: 2px solid #d4869e; display: flex; align-items: center; justify-content: center; margin-bottom: 1rem; }
        .badge-15 span { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 600; color: #c0607c; letter-spacing: -0.03em; }

        .header-name { font-size: 13px; font-weight: 700; letter-spacing: 0.22em; color: #b05570; text-transform: uppercase; text-align: center; line-height: 1.4; margin-bottom: 0.1rem; }
        .header-sub { font-size: 12px; font-weight: 600; letter-spacing: 0.16em; color: #c98fa0; text-transform: uppercase; text-align: center; margin-bottom: 1.8rem; }

        .section-title { font-family: 'Cormorant Garamond', serif; font-size: 16px; font-weight: 600; color: #b05570; margin: 1.4rem 0 0.6rem; align-self: flex-start; border-bottom: 1px solid #e8b4c4; width: 100%; padding-bottom: 0.2rem; text-transform: uppercase; letter-spacing: 0.1em; }

        .item-list { width: 100%; display: flex; flex-direction: column; gap: 0.75rem; }

        .menu-item { width: 100%; padding: 1rem 1.4rem; border-radius: 18px; background: #fff; color: #b05570; font-family: 'Montserrat', sans-serif; font-size: 11.5px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; box-shadow: 0 2px 8px rgba(200, 120, 150, 0.07); border: 1.5px solid #e8b4c4; line-height: 1.4; }

        /* ── Assinatura ── */
        .developer-signature {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
            color: #c8889c;
            font-size: 11px;
            margin-top: 1.2rem;
            opacity: 0.9;
            transition: opacity 0.2s, color 0.2s;
            font-family: 'Montserrat', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .developer-signature:hover { opacity: 1; color: #b05570; }
        .dev-logo {
            height: 18px;
            width: auto;
            border-radius: 6px;
            display: block;
            mix-blend-mode: multiply;
        }
        .dev-name { font-weight: 700; border-bottom: 1px solid transparent; transition: border-color 0.2s; }
        .developer-signature:hover .dev-name { border-color: #b05570; }
    </style>
</head>
<body>

<div class="card">
    <a href="index.html" class="btn-voltar">⬅ Voltar</a>

    <div class="badge-15"><span>15</span></div>
    <p class="header-name">Doces & Bolo</p>
    <p class="header-sub">Mesa de Doces</p>

    <h3 class="section-title">O Bolo Real</h3>
    <div class="item-list">
        <div class="menu-item">Bolo Festivo de Aniversário</div>
    </div>

    <h3 class="section-title">Doces Finos</h3>
    <div class="item-list">
        <div class="menu-item">Brigadeiros Gourmet Tradicionais</div>
        <div class="menu-item">Beijinhos de Coco</div>
        <div class="menu-item">Dois Amores</div>
        <div class="menu-item">Bombons e Copinhos Recheados Finos</div>
    </div>
</div>

<a href="https://mateusrad.github.io/portfolio/" target="_blank" class="developer-signature">
    <img src="img/logo_mateus.png" alt="Logo Mateus Rosa Developer" class="dev-logo" />
    <span>Code & Design por <span class="dev-name">Mateus Rosa</span></span>
</a>

</body>
</html>
