<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fila do Bar — 15 Anos Bárbara</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Montserrat:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            background: linear-gradient(160deg, #f7dde6 0%, #f9ece8 50%, #f5d8e2 100%);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        .top-navigation { width: 100%; max-width: 600px; display: flex; margin-bottom: 0.2rem; }
        .btn-voltar { font-size: 11px; font-weight: 700; color: #c0607c; text-decoration: none; letter-spacing: 0.1em; text-transform: uppercase; display: flex; align-items: center; gap: 0.3rem; }

        .logo-header { text-align: center; width: 100%; margin-bottom: 1.2rem; }
        .logo-header h1 { font-family: 'Cormorant Garamond', serif; font-size: 24px; color: #b05570; letter-spacing: 0.05em; text-transform: uppercase; }
        .logo-header p { font-size: 10px; font-weight: 700; color: #c98fa0; letter-spacing: 0.15em; text-transform: uppercase; margin-top: 0.1rem; }

        .painel-fila { width: 100%; max-width: 600px; display: flex; flex-direction: column; gap: 1.2rem; flex-grow: 1; }

        .coluna { background: rgba(255, 255, 255, 0.5); border-radius: 20px; border: 1px solid rgba(240, 185, 200, 0.4); padding: 1.2rem; backdrop-filter: blur(8px); display: flex; flex-direction: column; box-shadow: 0 6px 20px rgba(180, 80, 110, 0.04); }
        .coluna-pronto { background: linear-gradient(175deg, #fff2f5 0%, #fdeef2 100%); border: 2px solid #e8b4c4; box-shadow: 0 10px 25px rgba(180, 80, 110, 0.08); }

        .coluna-titulo { font-size: 12px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; text-align: center; margin-bottom: 0.8rem; padding-bottom: 0.4rem; border-bottom: 1.5px solid rgba(180, 80, 110, 0.12); }
        .titulo-preparando { color: #8c606d; }
        .titulo-pronto { color: #b05570; }

        .lista-nomes { display: flex; flex-direction: column; gap: 0.5rem; }

        .item-fila { background: #fff; padding: 0.8rem 1.2rem; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(232, 180, 196, 0.2); flex-wrap: wrap; gap: 8px;}
        .item-fila .nome { font-size: 14px; font-weight: 700; color: #555; }

        .drink-wrap { display: flex; align-items: center; gap: 6px; }
        .item-fila .drink { font-size: 10px; font-weight: 600; color: #c98fa0; text-transform: uppercase; letter-spacing: 0.05em; background: #faf2f4; padding: 0.2rem 0.5rem; border-radius: 6px; }

        /* Etiquetas de Álcool */
        .badge-alcool-fila { font-size: 8px; font-weight: 800; padding: 0.2rem 0.4rem; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.05em;}
        .fila-tag-com { background: #ffebee; color: #c62828; border: 1px solid #ffcdd2;}
        .fila-tag-sem { background: #e6f6ec; color: #2e7d32; border: 1px solid #c8e6c9;}

        .badge-status { font-size: 9px; font-weight: 800; padding: 4px 8px; border-radius: 8px; text-transform: uppercase; letter-spacing: 0.05em; margin-left: auto; }
        .status-preparando { background: #fff3e0; color: #e65100; border: 1px solid #ffe0b2; }
        .status-pronto { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }

        .coluna-pronto .item-fila { border-color: #e8b4c4; animation: pulse-brilho 2s infinite alternate; }
        .coluna-pronto .item-fila .nome { color: #b05570; font-size: 15px; }
        .coluna-pronto .item-fila .drink { background: #fce8ef; color: #b05570; }

        @keyframes pulse-brilho {
            0% { box-shadow: 0 2px 6px rgba(180, 80, 110, 0.02); }
            100% { box-shadow: 0 4px 12px rgba(180, 80, 110, 0.12); border-color: #d4869e; }
        }

        .live-bar { width: 100%; max-width: 600px; display: flex; align-items: center; justify-content: center; gap: 0.5rem; margin-bottom: 1rem; font-size: 10.5px; font-weight: 600; color: #c98fa0; letter-spacing: 0.08em; text-transform: uppercase; }
        .live-dot { width: 7px; height: 7px; border-radius: 50%; background: #81c784; flex-shrink: 0; animation: piscar 1.8s ease-in-out infinite; }

        @keyframes piscar { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

        .sem-pedidos { text-align: center; color: #c98fa0; font-size: 11px; font-style: italic; padding: 1rem 0; }

        .developer-signature { display: flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none; color: #c8889c; font-size: 11px; margin-top: 2rem; margin-bottom: 1rem; opacity: 0.9; transition: opacity 0.2s, color 0.2s; font-family: 'Montserrat', sans-serif; text-transform: uppercase; letter-spacing: 0.05em; width: 100%; }
        .developer-signature:hover { opacity: 1; color: #b05570; }
        .dev-logo { height: 18px; width: auto; border-radius: 6px; display: block; mix-blend-mode: multiply; }
        .dev-name { font-weight: 700; border-bottom: 1px solid transparent; transition: border-color 0.2s; }
        .developer-signature:hover .dev-name { border-color: #b05570; }
    </style>
</head>
<body>

<div class="top-navigation">
    <a href="drinks.html" class="btn-voltar">⬅ Voltar</a>
</div>

<div class="logo-header">
    <h1>Painel do Bar</h1>
    <p>Acompanhe e retire seu copo</p>
</div>

<div class="live-bar">
    <span class="live-dot"></span>
    <span>Ao vivo · Atualizado às <span id="horaUpdate">--:--</span></span>
</div>

<div class="painel-fila">
    <div class="coluna coluna-pronto">
        <h2 class="coluna-titulo titulo-pronto">✨ Prontos para Retirada (Retirar no Balcão)</h2>
        <div class="lista-nomes" id="listaPronto">
        </div>
    </div>

    <div class="coluna">
        <h2 class="coluna-titulo titulo-preparando">⏳ Preparando os Próximos Drinks</h2>
        <div class="lista-nomes" id="listaPreparando">
        </div>
    </div>
</div>

<a href="https://mateusrad.github.io/portfolio/" target="_blank" class="developer-signature">
    <img src="img/logo_mateus.png" alt="Logo Mateus Rosa Developer" class="dev-logo" />
    <span>Code & Design por <span class="dev-name">Mateus Rosa</span></span>
</a>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAsCh0k2Kx6jiS1R3mJtAvhMaIY00up-2E",
        authDomain: "menu-interativo-faaec.firebaseapp.com",
        databaseURL: "https://menu-interativo-faaec-default-rtdb.firebaseio.com",
        projectId: "menu-interativo-faaec",
        storageBucket: "menu-interativo-faaec.firebasestorage.app",
        messagingSenderId: "1046837961375",
        appId: "1:1046837961375:web:430ec81a42e46a0ccb38aa"
    };

    // NOVA LISTA CORRETA DE DRINKS COM ÁLCOOL
    const drinksComAlcool = [
        'Drink da Aniversariante (Com Álcool)',
        'Piña Colada (Com Álcool)',
        'Lagoa Azul (Com Álcool)',
        'Gin Morango e Pêssego',
        'Caipirinhas Variadas',
        'Gin Tônica com Especiarias',
        'Sex on the Beach'
    ];

    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);
    const pedidosRef = ref(database, 'pedidos');

    onValue(pedidosRef, (snapshot) => {
        const agora = new Date();
        document.getElementById('horaUpdate').innerText = agora.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });

        const divPreparando = document.getElementById('listaPreparando');
        const divPronto = document.getElementById('listaPronto');

        divPreparando.innerHTML = "";
        divPronto.innerHTML = "";

        if (!snapshot.exists()) {
            divPreparando.innerHTML = '<div class="sem-pedidos">Nenhum drink na fila.</div>';
            divPronto.innerHTML = '<div class="sem-pedidos">Nenhum drink no balcão.</div>';
            return;
        }

        const dados = snapshot.val();
        const lista = Object.keys(dados).map(key => dados[key]);
        lista.sort((a, b) => (a.dataHora || 0) - (b.dataHora || 0));

        let contPronto = 0;
        let contPendente = 0;

        lista.forEach((pedido) => {
            // Verifica o álcool para a fila também
            let tagAlcool = '';
            if (drinksComAlcool.includes(pedido.drink)) {
                tagAlcool = `<span class="badge-alcool-fila fila-tag-com">🔞 Com Álcool</span>`;
            } else {
                tagAlcool = `<span class="badge-alcool-fila fila-tag-sem">🟢 Sem Álcool</span>`;
            }

            const item = document.createElement('div');
            item.className = 'item-fila';

            let badgeStatus = '';
            if (pedido.status === "pendente" && contPendente < 5) {
                badgeStatus = `<span class="badge-status status-preparando">Preparando</span>`;
                item.innerHTML = `<span class="nome">${pedido.convidado}</span><div class="drink-wrap"><span class="drink">${pedido.drink}</span>${tagAlcool}</div>${badgeStatus}`;
                divPreparando.appendChild(item);
                contPendente++;
            } else if (pedido.status === "pronto" && contPronto < 5) {
                badgeStatus = `<span class="badge-status status-pronto">Pronto</span>`;
                item.innerHTML = `<span class="nome">${pedido.convidado}</span><div class="drink-wrap"><span class="drink">${pedido.drink}</span>${tagAlcool}</div>${badgeStatus}`;
                divPronto.appendChild(item);
                contPronto++;
            }
        });

        if (contPendente === 0) divPreparando.innerHTML = '<div class="sem-pedidos">Nenhum drink na fila.</div>';
        if (contPronto === 0) divPronto.innerHTML = '<div class="sem-pedidos">Nenhum drink no balcão.</div>';
    });
</script>

</body>
</html>
