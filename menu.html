<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu — 15 Anos Bárbara</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Montserrat:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(160deg, #f7dde6 0%, #f9ece8 50%, #f5d8e2 100%);
            padding: 2rem 1rem;
        }

        .card {
            width: 100%;
            max-width: 380px;
            background: linear-gradient(175deg, #fff5f7 0%, #fdeef2 100%);
            border-radius: 32px;
            padding: 2.4rem 1.8rem 2.2rem;
            box-shadow: 0 12px 40px rgba(180, 80, 110, 0.13);
            border: 1px solid rgba(240, 185, 200, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
        }

        /* ── Ícone circular "15" ── */
        .badge-15 {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: 2px solid #d4869e;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1rem;
            background: transparent;
        }

        .badge-15 span {
            font-family: 'Cormorant Garamond', serif;
            font-size: 20px;
            font-weight: 600;
            color: #c0607c;
            letter-spacing: -0.03em;
        }

        /* ── Header ── */
        .header-name {
            font-family: 'Montserrat', sans-serif;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.22em;
            color: #b05570;
            text-transform: uppercase;
            text-align: center;
            line-height: 1.4;
            margin-bottom: 0.1rem;
        }

        .header-sub {
            font-family: 'Montserrat', sans-serif;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.16em;
            color: #c98fa0;
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 1.8rem;
        }

        /* ── Botões ── */
        .btn-list {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .btn-menu {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 1rem 1.2rem 1rem 1.4rem;
            border-radius: 18px;
            border: 1.5px solid #e8b4c4;
            background: #fff;
            color: #b05570;
            font-family: 'Montserrat', sans-serif;
            font-size: 11.5px;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.22s ease;
            box-shadow: 0 2px 8px rgba(200, 120, 150, 0.07);
        }

        .btn-menu:hover {
            background: #fce8ef;
            border-color: #d48099;
            transform: translateY(-1px);
            box-shadow: 0 6px 18px rgba(200, 100, 130, 0.15);
        }

        .btn-menu:active {
            transform: translateY(0);
        }

        .btn-menu .icon {
            font-size: 17px;
            flex-shrink: 0;
        }

        .btn-menu .label {
            flex: 1;
            text-align: left;
            padding-left: 0.9rem;
        }

        /* ── Botão de Fotos (destaque especial) ── */
        .btn-fotos {
            background: #fce8f0;
            border-color: #e8afc2;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.55rem;
            padding: 1.1rem 1.4rem;
            margin-top: 0.15rem;
        }

        .btn-fotos:hover { background: #f9d9e8; }

        .btn-fotos .fotos-top {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        /* Contêiner das imagens: fundo rosê cobre o branco da JPG */
        .fotos-img-wrap {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: #fce8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
        }

        .fotos-img-wrap img {
            width: 28px;
            height: 28px;
            object-fit: contain;
            /* Remove o fundo branco da JPG com mix-blend-mode */
            mix-blend-mode: multiply;
        }

        .btn-fotos .fotos-title {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.14em;
            color: #b05570;
            text-align: center;
        }

        .btn-fotos .fotos-sub {
            font-size: 9.5px;
            font-weight: 600;
            letter-spacing: 0.1em;
            color: #c8889c;
            text-transform: uppercase;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="card">

    <!-- Badge 15 -->
    <div class="badge-15"><span>15</span></div>

    <!-- Cabeçalho -->
    <p class="header-name">15 anos da<br>Bárbara</p>
    <p class="header-sub"></p>

    <!-- Botões Atualizados com a Fila de Espera -->
    <div class="btn-list">

        <a href="buffet.html" class="btn-menu">
            <span class="label">Cardápio do Buffet</span>
            <span class="icon">🍽️</span>
        </a>

        <a href="doces.html" class="btn-menu">
            <span class="label">Seleção de Doces</span>
            <span class="icon">🧁</span>
        </a>

        <a href="bar.html" class="btn-menu">
            <span class="label">Bebidas do Bar</span>
            <span class="icon">🍷</span>
        </a>

        <a href="drinks.html" class="btn-menu">
            <span class="label">Drinks c/s Álcool</span>
            <span class="icon">🍹</span>
        </a>

        <!-- Novo botão para abrir o mural de pedidos -->
        <a href="fila.html" class="btn-menu" style="background: #fffbfd; border-color: #e8b4c4;">
            <span class="label" style="color: #c0607c;">Fila de Espera</span>
            <span class="icon">⏳</span>
        </a>

        <a href="https://photos.app.goo.gl/jTva4GbmPCjdf9rAA" target="_blank" class="btn-menu btn-fotos">
            <div class="fotos-top">
                <div class="fotos-img-wrap">
                    <img src="img/google_fotos.jpg" alt="Google Fotos">
                </div>
                <div class="fotos-img-wrap">
                    <img src="img/comartilhar.jpg" alt="Compartilhar">
                </div>
            </div>
            <span class="fotos-title">COMPARTILHE SUAS FOTOS DA FESTA</span>
            <span class="fotos-sub">Álbum compartilhado no telão</span>
        </a>

    </div>

</div>

</body>
</html>
